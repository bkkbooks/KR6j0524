body:
  text: 金剛智三藏譯提頭攞宅善神緑青色開口現忿怒相貌被甲胄著赤衣右手持大刀左手捧鉾髮紫色也毗盧勒叉善神赤紫色忿怒相現閉唇之形右拔折囉左押腰被甲胄著白青色衣鬢髮紺色摧伏毒害善神鬢聳立弭也赤肉色右手持大刀左手向外當胸被甲胄著白色衣服餘如常增益善神赤肉色四臂容怒鬼右第一手持大刀第二手把劍輪左第一手持楊枝第二手捧半月著袈裟其色緑色裳紅懸頸瓔珞歡喜善神緑色頂上有孔雀其色金色右手持一股鉤左手押腰被甲胄著赤衣鬢髮丹色面體忿怒也除一切障難善神黃色作瞋怒相六臂被鮮白衣服右手持三戟叉次手持經典次手捧舍利寶塔左手持紅蓮華次手持寶鉤次手把寶螺戴寶冠著袈裟吹天衣風瓔珞環釧如常拔除罪垢善神裸形被赤緑色袈裟髮毛聳立赤黃色相也右手持棒其棒有五叉左手作拳置頂上瞋眼開口利牙出上下甚怖畏也能忍善神空色右手持大刀左手持矟被頂巾其色白下至腂才見胄端鬢髮紫也已上右方立之吠室羅摩拏善神青黑色現瞋王相作閉唇相右手持金剛棓左手捧全身舍利寶塔被甲胄著赤衣鬢髮紫色也毗盧博叉善神肉色懸黑絲臂以筆作書寫之勢被甲胄著緑色衣服鬢髮赤色微笑之形也離一切怖畏神形體如帝釋天但頂上有髑髏髑髏上有三股形救護一切善神青白色相貌如毗沙門天左右手合掌十指端有紅色微敷蓮華衣服赤黃色攝伏諸魔善神髮毛聳立黑肉色相貌以瓔珞為莊嚴右手持劍左手下掌向外衣服黃色能救諸有善神白緑色顏貌玉相也二手虛心合掌屈二頭指附中指背第一文胄上被白色袈裟裳赤色也師子威猛善神肉色戴師子寶冠右第一持斧第二手持劍左第一手持梵夾第二手持三叉戟被袈裟其色紺色也著小服虎皮極惡忿怒也勇猛心地善神被甲胄緑色如能救諸有二手外縛當胸微笑之相也已上左方立之本奧云又陀羅尼集經第三卷說十六善神名字并總呪又如空比丘夢感自塔院律師之已上谷響集八云世有金剛智所譯般若守護十六善神一卷三紙讀之明知非是金剛智筆語綴文甚拙想先達依金剛智圖畫録之而假金智名矣不自揣之甚今謂於翻譯席設譯語筆授證義綴文等職翻梵為漢必不譯主之一手而有再治有未治唯以義通為其長豈以文飾為今歲得一本於智積院方丈挍小池坊藏本而印行時享和二壬戌年仲夏月豐山長谷輪下沙門快道志一校了慈順文政三年庚辰仲秋晦日右以秀陽闍梨令密榮挍之本亦一校了龍肝
